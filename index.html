<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Overlay Engine</title>
    <style>
        .parent {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 8px;
            height: 100vh;
        }

        .parent>div {
            background: #222;
            color: white;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .div1 {
            grid-column: 1 / 5;
            grid-row: 2 / 8;
        }

        .div2 {
            grid-column: 1;
            grid-row: 1;
        }

        .div3 {
            grid-column: 2;
            grid-row: 1;
        }

        .div4 {
            grid-column: 3;
            grid-row: 1;
        }

        .div6 {
            grid-column: 5 / 7;
            grid-row: 1/9;
        }

        .div7 {
            grid-column: 1;
            grid-row: 8;
        }

        .div8 {
            grid-column: 2;
            grid-row: 8;
        }

        .div9 {
            grid-column: 3;
            grid-row: 8;
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
        <div class="div6">6</div>
        <div class="div7">7</div>
        <div class="div8">8</div>
        <div class="div9">9</div>
    </div>

</body>
